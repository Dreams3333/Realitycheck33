<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0"    stop-color="#2b1556"/>
      <stop offset="0.5"  stop-color="#1b0e3a"/>
      <stop offset="1"    stop-color="#0d0620"/>
    </linearGradient>
    <radialGradient id="topGlow" cx="0.5" cy="0.30" r="0.6">
      <stop offset="0"   stop-color="#6a34c0" stop-opacity="0.55"/>
      <stop offset="1"   stop-color="#6a34c0" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="disc" cx="0.42" cy="0.36" r="0.85">
      <stop offset="0"    stop-color="#3a2168"/>
      <stop offset="0.6"  stop-color="#241247"/>
      <stop offset="1"    stop-color="#170c30"/>
    </radialGradient>
    <linearGradient id="ring" x1="0" y1="0" x2="0.4" y2="1">
      <stop offset="0"    stop-color="#ffe9a8"/>
      <stop offset="0.5"  stop-color="#e8b64e"/>
      <stop offset="1"    stop-color="#a9761f"/>
    </linearGradient>
    <linearGradient id="gold" x1="0.1" y1="0" x2="0.3" y2="1">
      <stop offset="0"    stop-color="#fff6d8"/>
      <stop offset="0.35" stop-color="#ffdd82"/>
      <stop offset="0.65" stop-color="#f2ad38"/>
      <stop offset="1"    stop-color="#bd7d16"/>
    </linearGradient>
    <radialGradient id="discGloss" cx="0.5" cy="0.28" r="0.5">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.20"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <filter id="discShadow" x="-40%" y="-40%" width="180%" height="180%">
      <feDropShadow dx="0" dy="18" stdDeviation="30" flood-color="#000000" flood-opacity="0.55"/>
    </filter>
    <filter id="checkShadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#3a1e00" flood-opacity="0.55"/>
    </filter>
    <filter id="sheenTop" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="0"/>
    </filter>
  </defs>

  <!-- background -->
  <rect width="1024" height="1024" fill="url(#bg)"/>
  <rect width="1024" height="1024" fill="url(#topGlow)"/>

  <!-- medallion -->
  <g filter="url(#discShadow)">
    <circle cx="512" cy="512" r="312" fill="url(#disc)"/>
  </g>
  <!-- fine gold ring -->
  <circle cx="512" cy="512" r="312" fill="none" stroke="url(#ring)" stroke-width="14"/>
  <circle cx="512" cy="512" r="292" fill="none" stroke="#000000" stroke-opacity="0.18" stroke-width="2"/>
  <!-- glass gloss on disc -->
  <ellipse cx="512" cy="392" rx="250" ry="150" fill="url(#discGloss)"/>

  <!-- checkmark -->
  <g filter="url(#checkShadow)">
    <path d="M388,520 L470,606 L648,412" fill="none" stroke="url(#gold)"
          stroke-width="60" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M394,514 L470,594 L642,410" fill="none" stroke="#fff7de" stroke-opacity="0.9"
          stroke-width="13" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
</svg>
