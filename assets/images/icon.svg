<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="bg" cx="0.5" cy="0.42" r="0.75">
      <stop offset="0"    stop-color="#5a2ca0"/>
      <stop offset="0.5"  stop-color="#331762"/>
      <stop offset="1"    stop-color="#100826"/>
    </radialGradient>
    <radialGradient id="halo" cx="0.5" cy="0.44" r="0.42">
      <stop offset="0"   stop-color="#a25bff" stop-opacity="0.55"/>
      <stop offset="1"   stop-color="#a25bff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="goldFace" x1="0.1" y1="0" x2="0.3" y2="1">
      <stop offset="0"    stop-color="#fff7d6"/>
      <stop offset="0.3"  stop-color="#ffdd7a"/>
      <stop offset="0.6"  stop-color="#f4ad33"/>
      <stop offset="1"    stop-color="#b9760f"/>
    </linearGradient>
    <linearGradient id="sheen" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.14"/>
      <stop offset="0.45" stop-color="#ffffff" stop-opacity="0.03"/>
      <stop offset="0.7" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <filter id="drop" x="-40%" y="-40%" width="180%" height="180%">
      <feDropShadow dx="0" dy="20" stdDeviation="26" flood-color="#0a0418" flood-opacity="0.6"/>
    </filter>
    <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
      <feDropShadow dx="0" dy="0" stdDeviation="28" flood-color="#ffb63c" flood-opacity="0.55"/>
    </filter>
  </defs>

  <!-- background -->
  <rect width="1024" height="1024" fill="url(#bg)"/>
  <!-- faint facet lines (lens/prism) -->
  <g stroke="#ffffff" stroke-opacity="0.05" stroke-width="2" fill="none">
    <path d="M512,512 L120,120"/>
    <path d="M512,512 L904,120"/>
    <path d="M512,512 L120,904"/>
    <path d="M512,512 L904,904"/>
    <path d="M512,512 L512,60"/>
    <path d="M512,512 L512,964"/>
    <path d="M512,512 L60,512"/>
    <path d="M512,512 L964,512"/>
  </g>
  <rect width="1024" height="1024" fill="url(#halo)"/>
  <path d="M0,0 H1024 V320 Q512,480 0,320 Z" fill="url(#sheen)"/>

  <!-- HERO CHECK, embossed 3D -->
  <g filter="url(#glow)">
    <!-- spectrum edge nods (subtle brand glitch) -->
    <path d="M286,500 L452,662 L764,352" fill="none" stroke="#ff2fbf" stroke-opacity="0.5"
          stroke-width="104" stroke-linecap="round" stroke-linejoin="round" transform="translate(-14,-8)"/>
    <path d="M286,500 L452,662 L764,352" fill="none" stroke="#22e0ff" stroke-opacity="0.5"
          stroke-width="104" stroke-linecap="round" stroke-linejoin="round" transform="translate(14,8)"/>
  </g>
  <g filter="url(#drop)">
    <!-- dark base for depth -->
    <path d="M286,500 L452,662 L764,352" fill="none" stroke="#7a4a08"
          stroke-width="112" stroke-linecap="round" stroke-linejoin="round" transform="translate(0,12)"/>
    <!-- gold face -->
    <path d="M286,500 L452,662 L764,352" fill="none" stroke="url(#goldFace)"
          stroke-width="104" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- specular highlight -->
    <path d="M296,492 L452,646 L756,350" fill="none" stroke="#fff8e0" stroke-opacity="0.9"
          stroke-width="20" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <rect x="5" y="5" width="1014" height="1014" fill="none"
        stroke="#ffffff" stroke-opacity="0.06" stroke-width="9"/>
</svg>
