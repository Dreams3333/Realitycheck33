services:
  - type: web
    name: reality-check-api
    runtime: node
    buildCommand: cd backend && npm install && npm run build
    startCommand: node backend/dist/index.js
    plan: free
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: ANTHROPIC_API_KEY
        value: ""
      - key: ADMIN_SECRET_KEY
        generateValue: true
      - key: STRIPE_SECRET_KEY
        value: ""
      - key: STRIPE_WEBHOOK_SECRET
        value: ""
      - key: STRIPE_PREMIUM_PRICE_ID
        value: ""
      - key: APP_URL
        sync: false
